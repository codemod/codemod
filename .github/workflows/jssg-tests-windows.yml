name: Codemod JSSG tests (windows-latest)

on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".nvmrc"
      - ".github/workflows/jssg-tests-windows.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".nvmrc"
      - ".github/workflows/jssg-tests-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jssg-tests-windows:
    name: Codemod JSSG tests (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          check-latest: true
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: |
          node --run test *>&1 | Tee-Object -FilePath jssg-test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-jssg-test-log
          path: jssg-test.log
          if-no-files-found: warn
