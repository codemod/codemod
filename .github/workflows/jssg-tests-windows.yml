name: Codemod JSSG tests (windows-2022)

on:
  push:
    branches:
      - main
      - fix/windows-rolldown-verbatim-path
    paths:
      - "crates/cli/src/commands/jssg/test.rs"
      - "crates/cli/src/commands/publish.rs"
      - "crates/cli/src/utils/rolldown_bundler.rs"
      - "crates/cli/src/main.rs"
      - "crates/cli/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/jssg-tests-windows.yml"
  pull_request:
    branches:
      - main
      - fix/windows-rolldown-verbatim-path
    paths:
      - "crates/cli/src/commands/jssg/test.rs"
      - "crates/cli/src/commands/publish.rs"
      - "crates/cli/src/utils/rolldown_bundler.rs"
      - "crates/cli/src/main.rs"
      - "crates/cli/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/jssg-tests-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jssg-tests-windows:
    name: Codemod JSSG tests (windows-2022)
    # Pin MSVC jobs to VS 2022 until libz-ng-sys/cmake supports the VS 2026 image.
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Windows CLI bundling tests
        shell: pwsh
        run: |
          cargo test -p codemod commands::jssg::test::tests -- --nocapture *>&1 | Tee-Object -FilePath jssg-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test -p codemod utils::rolldown_bundler::tests -- --nocapture *>&1 | Tee-Object -Append -FilePath jssg-test.log
          exit $LASTEXITCODE

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-jssg-test-log
          path: jssg-test.log
          if-no-files-found: warn
