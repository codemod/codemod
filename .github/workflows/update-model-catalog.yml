name: Update Model Catalog

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-model-catalog:
    name: Update OpenRouter Model Catalog
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Update model catalog snapshot
        run: cargo run -p xtask -- update-model-catalog

      - name: Read snapshot metadata
        id: metadata
        run: |
          BRANCH_DATE=$(date -u +%Y%m%d)
          GENERATED_AT=$(jq -r '.generated_at' crates/ai/data/openrouter_models.json)
          MODEL_COUNT=$(jq '.models | length' crates/ai/data/openrouter_models.json)
          DIFF_SUMMARY=$(git diff --numstat -- crates/ai/data/openrouter_models.json | awk '{print $1 " insertions, " $2 " deletions"}')
          if [ -z "$DIFF_SUMMARY" ]; then
            DIFF_SUMMARY="no snapshot changes"
          fi
          echo "branch_date=$BRANCH_DATE" >> "$GITHUB_OUTPUT"
          echo "generated_at=$GENERATED_AT" >> "$GITHUB_OUTPUT"
          echo "model_count=$MODEL_COUNT" >> "$GITHUB_OUTPUT"
          echo "diff_summary=$DIFF_SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ai): update OpenRouter model catalog snapshot"
          title: "chore(ai): update OpenRouter model catalog snapshot"
          body: |
            Automated weekly refresh of the OpenRouter model catalog snapshot used by `codemod-ai`.

            Snapshot metadata:
            - Generated at: `${{ steps.metadata.outputs.generated_at }}`
            - Model count: `${{ steps.metadata.outputs.model_count }}`
            - Diff summary: `${{ steps.metadata.outputs.diff_summary }}`

            This PR was created automatically by `.github/workflows/update-model-catalog.yml`.
          branch: "chore/update-model-catalog-${{ steps.metadata.outputs.branch_date }}"
          base: main
          delete-branch: true
