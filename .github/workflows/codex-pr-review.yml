name: Codex PR Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review manually
        required: true
        type: number

jobs:
  codex-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: codemod/codex-review-action/.github/workflows/review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
      codex_model: ${{ vars.AZURE_OPENAI_CODEX_MODEL }}
      node_version: "24"
      pnpm_version: "10.19.0"
      install_command: pnpm install --frozen-lockfile
      working_directory: .
      codex_effort: medium
      sandbox: workspace-write
      review_focus: |
        Focus on:
        - correctness bugs
        - behavioral regressions
        - missing tests or missing edge-case coverage
        - security issues
    secrets:
      azure_openai_api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}
      azure_openai_responses_endpoint: ${{ secrets.AZURE_OPENAI_RESPONSES_ENDPOINT }}
